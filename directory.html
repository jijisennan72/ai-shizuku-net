</head>
<body>

<nav class="navbar"><div class="navbar-inner">
  <a href="index.html" class="navbar-logo"><span class="drop"></span>AIしずくネット</a>
  <ul class="navbar-nav" id="navMenu">
    <li><a href="directory.html">ツール一覧</a></li>
    <li><a href="categories.html">カテゴリ</a></li>

  </ul>
  <button class="hamburger" onclick="toggleMenu()"><span></span><span></span><span></span></button>
</div></nav>

<section style="background:var(--sky);padding:48px 0 24px;">
  <div class="container">
    <h1 style="color:var(--navy);margin-bottom:8px;">AIツール一覧</h1>
    <p>176件のAIツールを検索・カテゴリ・料金で絞り込めます</p>
    <div class="search-wrap" style="margin-top:24px;">
      <input type="text" class="search-input" id="dirSearch" placeholder="ツール名・機能で検索..." oninput="filterTools(this.value)">
      <button class="search-btn">🔍</button>
    </div>
  </div>
</section>

<section class="section-sm">
  <div class="container">

    <!-- 大分類タブ -->
    <div id="genreTabs" class="genre-tabs" style="display:flex;gap:8px;flex-wrap:wrap;margin-bottom:12px;"></div>
    <!-- 中分類チップ -->
    <div style="display:flex;align-items:center;gap:8px;flex-wrap:wrap;">
      <div id="catChips" style="display:flex;gap:8px;flex-wrap:wrap;flex:1;"></div>
      <div style="display:flex;gap:8px;margin-left:auto;">
        <button class="filter-chip" onclick="setPriceFilter(this,'free')">🆓 無料</button>
        <button class="filter-chip" onclick="setPriceFilter(this,'freemium')">無料プランあり</button>
        <button class="filter-chip" onclick="setPriceFilter(this,'paid')">有料</button>
      </div>
    </div>

    <div class="grid-3" id="toolsGrid">
    </div>

    <div id="noResults" class="hidden" style="text-align:center;padding:40px;color:var(--gray-400);">
      <div style="font-size:2.5rem;margin-bottom:12px;">🔍</div>
      <p>条件に合うツールが見つかりませんでした。別のキーワードで試してみてください。</p>
    </div>

  </div>
</section>
